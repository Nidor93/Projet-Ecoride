<form method="POST">
    <div class="mb-3">
        <label for="telephone" class="form-label fw-bold">Numéro de téléphone</label>
            <input type="text" required minlength="10" required maxlength="10" name="telephone" class="form-control" id="telephone" placeholder="Votre numéro de téléphone" required>
    </div>
    <div class="mb-3">
        <label for="email" class="form-label fw-bold">Adresse Email</label>
            <input type="email" name="email" class="form-control" id="email" placeholder="nom@exemple.com" required>
    </div>
    <div class="d-grid gap-2 mt-4">
        <button type="submit" class="btn btn-success fw-bold">Confirmer mes nouvelles informations</button>
    </div>
</form>
